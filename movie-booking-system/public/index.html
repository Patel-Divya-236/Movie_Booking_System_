<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cloud-Based Movie Ticket Booking System — Book your favourite movie tickets online">
  <title>CineCloud — Movie Ticket Booking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="nav-brand" onclick="navigate('movies')">
      <span class="brand-icon">🎬</span>
      <span class="brand-text">CineCloud</span>
    </div>
    <div class="nav-links" id="navLinks">
      <a href="#" onclick="navigate('movies')" class="nav-link active" data-view="movies">Movies</a>
      <a href="#" onclick="navigate('history')" class="nav-link" data-view="history">My Bookings</a>
      <a href="#" onclick="navigate('admin')" class="nav-link" data-view="admin" id="adminLink" style="display:none">Admin</a>
    </div>
    <div class="nav-auth" id="navAuth">
      <button onclick="navigate('login')" class="btn btn-ghost" id="loginBtn">Login</button>
      <button onclick="navigate('register')" class="btn btn-primary" id="registerBtn">Sign Up</button>
      <div class="user-menu" id="userMenu" style="display:none">
        <span class="user-avatar" id="userAvatar">U</span>
        <span class="user-name" id="userName"></span>
        <button onclick="logout()" class="btn btn-ghost btn-sm">Logout</button>
      </div>
    </div>
    <button class="nav-toggle" id="navToggle" onclick="toggleMobileNav()">☰</button>
  </nav>

  <!-- Main Content -->
  <main id="app" class="main-content">
    <!-- Views are rendered here by JavaScript -->
  </main>

  <!-- Toast Notifications -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="/js/app.js"></script>
</body>
</html>
